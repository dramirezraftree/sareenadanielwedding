<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Invited — Sareena & Daniel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@1,600;1,700&family=Josefin+Sans:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #e8e0d4; font-family: 'Josefin Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 80px; }

    #private-msg { display: none; text-align: center; margin-top: 40vh; }
    #private-msg p { font-family: 'Cormorant', serif; font-size: 22px; font-style: italic; color: #3a2e28; opacity: 0.5; }

    #invite-wrapper { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 480px; }

    /* ── Top website button ── */
    .website-btn {
      display: inline-block;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #2a1f1a;
      background: transparent;
      border: 1px solid rgba(184,149,42,0.5);
      text-decoration: none;
      padding: 13px 28px;
      transition: background 0.2s, color 0.2s;
    }
    .website-btn:hover { background: #b8952a; color: white; }
    .btn-top { margin-bottom: 28px; opacity: 0; animation: fadeUp 1s ease forwards 0.3s; }
    .btn-bottom { margin-top: 32px; }

    /* ── For / name ── */
    .for-label { font-family: 'Josefin Sans', sans-serif; font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase; color: #e8724a; margin-bottom: 8px; opacity: 0; animation: fadeUp 1s ease forwards 0.3s; }
    .guest-name-display { font-family: 'Cormorant', serif; font-size: 36px; font-weight: 700; font-style: italic; color: #2a1f1a; margin-bottom: 36px; line-height: 1.2; text-align: center; opacity: 0; animation: fadeUp 1s ease forwards 0.6s; }

    /* ── Envelope ── */
    #envelope-container { width: 100%; opacity: 0; animation: fadeUp 1s ease forwards 1s; }
    #envelope-container svg { width: 100%; height: auto; display: block; }

    .open-prompt { margin-top: 20px; font-family: 'Josefin Sans', sans-serif; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: #b8952a; cursor: pointer; border-bottom: 1px solid rgba(184,149,42,0.4); padding-bottom: 4px; opacity: 0; animation: fadeUp 0.8s ease forwards 1.8s; transition: opacity 0.2s; }
    .open-prompt:hover { opacity: 0.7; }

    /* ── Single invite card ── */
    #pages-container { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 480px; opacity: 0; }
    #pages-container.visible { display: flex; animation: fadeIn 2.4s ease forwards; }

    .invite-page {
      position: relative;
      width: 100%;
      /* 2857:4000 ≈ 5:7 ratio */
      aspect-ratio: 2857 / 4000;
      background: #ffffff;
      box-shadow: 0 4px 32px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    /* The actual invite image — swap placeholder div for this img tag:
       <img src="Wedding_Invitation.png" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;display:block;" alt="Invitation">
    */
    .card-placeholder {
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fdf6ed;
      border: 1px solid rgba(184,149,42,0.18);
    }
    .placeholder-label { font-family: 'Josefin Sans', sans-serif; font-size: 8px; letter-spacing: 0.35em; text-transform: uppercase; color: #b8952a; opacity: 0.4; margin-bottom: 10px; }
    .placeholder-note { font-family: 'Cormorant', serif; font-size: 16px; font-style: italic; color: #3a2e28; opacity: 0.25; }

    /* ── Footer ── */
    .page-footer { margin-top: 24px; font-family: 'Josefin Sans', sans-serif; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; }
    .page-footer a { color: #b8952a; text-decoration: none; }

    /* ── Animations ── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideDown { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(120%); } }

    /* ── Desktop: wider envelope ── */
    @media (min-width: 769px) {
      #invite-wrapper { max-width: min(800px, 72vw); }
      .guest-name-display { font-size: 44px; }
    }
  </style>

  <script>
    // ============================================
    // GUEST LIST — one line per household
    // ============================================
    const guests = {
      "test": "Sareena & Daniel",
      // "mark-meyer": "Mark Meyer",
      // "clare-ramirez-raftree-and-brandon-de-jesus": "Clare Ramirez-Raftree and Brandon de Jesus",
    };

    const params = new URLSearchParams(window.location.search);
    const token = params.get('guest');
    const guestName = guests[token];

    if (!guestName) {
      document.getElementById('private-msg').style.display = 'block';
    } else {
      document.getElementById('invite-wrapper').style.display = 'flex';
      document.getElementById('guest-display').textContent = guestName;

      const el1   = document.getElementById('env-name-1');
      const elAmp = document.getElementById('env-name-amp');
      const el2   = document.getElementById('env-name-2');

      const nameLen  = guestName.length;
      const fontSize = nameLen > 34 ? 10 : nameLen > 26 ? 12 : nameLen > 18 ? 14 : 15;

      el1.setAttribute('y', '230');
      el1.setAttribute('font-size', fontSize);
      el1.textContent   = guestName;
      elAmp.textContent = '';
      el2.textContent   = '';

      // ============================================
      // TRACKING — uncomment and replace URL when ready
      // fetch('YOUR_TRACKING_URL?guest=' + encodeURIComponent(token));
      // ============================================
    }

    function revealCard() {
      const env   = document.getElementById('envelope-container');
      const btn   = document.getElementById('open-btn');
      const pages = document.getElementById('pages-container');
      btn.style.display = 'none';
      env.style.animation = 'slideDown 1s ease forwards';
      setTimeout(() => {
        env.style.display = 'none';
        pages.classList.add('visible');
      }, 900);
    }
  </script>
