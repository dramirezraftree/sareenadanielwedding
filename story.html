<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Sareena & Daniel · November 2026 · Goa</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400&family=Noto+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 0 80px;
  }

  .gallery-grid img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
    transition: opacity 0.3s ease;
    cursor: pointer;
  }

  .gallery-grid img:hover { opacity: 0.88; }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(42, 31, 26, 0.95);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .lightbox.open { display: flex; }

  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    cursor: default;
  }

  .lightbox-close {
    position: absolute;
    top: 24px;
    right: 32px;
    color: rgba(255,255,255,0.6);
    font-size: 32px;
    cursor: pointer;
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 200;
    line-height: 1;
  }

  .lightbox-close:hover { color: white; }

  .lightbox-prev,
  .lightbox-next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 40px;
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    padding: 20px;
    user-select: none;
  }

  .lightbox-prev { left: 16px; }
  .lightbox-next { right: 16px; }
  .lightbox-prev:hover,
  .lightbox-next:hover { color: white; }

  @media (max-width: 768px) {
    .gallery-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-monogram" href="index.html">S & D</a>
  <button class="hamburger" onclick="toggleMenu()">&#9776;</button>
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="concept.html">What We're Celebrating</a></li>
    <li><a href="prewedding.html">Pre-Wedding</a></li>
    <li><a href="events.html">Wedding Events</a></li>
    <li><a href="dresscode.html">Dress Code</a></li>
    <li><a href="travel.html">Travel & Accommodations</a></li>
    <li><a href="story.html" class="active-nav">Gallery</a></li>
    <li><a href="registry.html">Registry</a></li>
    <li><a href="faq.html">FAQ</a></li>
    <li><a href="rsvp.html">RSVP</a></li>
  </ul>
</nav>

<main id="story" class="page-content">
  <div class="page-header">
    <p class="page-eyebrow">Our life together</p>
    <h2 class="page-title">Gallery</h2>
    <div class="page-rule"></div>
  </div>

  <div class="gallery-wrapper">
    <p style="font-size:13px; opacity:0.5; font-weight:300; text-align:center; margin-bottom:52px; font-style:italic;">Check us out ;)</p>
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
  <span class="lightbox-prev" onclick="event.stopPropagation(); changeImage(-1)">&#8249;</span>
  <img id="lightbox-img" src="" alt="">
  <span class="lightbox-next" onclick="event.stopPropagation(); changeImage(1)">&#8250;</span>
</div>

<footer>
  <div class="footer-names">Sareena & Daniel</div>
  <div class="footer-date">November 27–28, 2026 · Goa, India</div>
  <div class="footer-motif">❋ ✦ ❋</div>
</footer>

<script>
  const TOTAL = 24;
  let current = 0;

  const grid = document.getElementById('gallery-grid');
  for (let i = 1; i <= TOTAL; i++) {
    const img = document.createElement('img');
    img.src = `Wedding ${i}.jpg`;
    img.alt = `Sareena and Daniel — photo ${i}`;
    img.loading = 'lazy';
    img.onclick = () => openLightbox(i - 1);
    grid.appendChild(img);
  }

  function openLightbox(index) {
    current = index;
    document.getElementById('lightbox-img').src = `Wedding ${current + 1}.jpg`;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox(e) {
    if (e && e.target !== document.getElementById('lightbox')) return;
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function changeImage(dir) {
    current = (current + dir + TOTAL) % TOTAL;
    document.getElementById('lightbox-img').src = `Wedding ${current + 1}.jpg`;
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowRight') changeImage(1);
    if (e.key === 'ArrowLeft') changeImage(-1);
    if (e.key === 'Escape') {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
  });

  function toggleMenu() {
    document.getElementById('nav-links').classList.toggle('open');
  }
</script>

</body>
</html>
