    <p style="font-size:13px; opacity:0.5; font-weight:300; text-align:center; margin-bottom:52px; font-style:italic;">Check us out ;)</p>
    <div class="gallery-grid" id="gallery-grid"></div>

<!-- Lightbox -->
<div id="lightbox" style="display:none; position:fixed; inset:0; background:rgba(42,31,26,0.95); z-index:2000; align-items:center; justify-content:center; cursor:pointer;">
  <span onclick="closeLightbox()" style="position:absolute; top:24px; right:32px; color:rgba(255,255,255,0.6); font-size:32px; cursor:pointer; font-family:'Josefin Sans',sans-serif; font-weight:200; line-height:1;">&times;</span>
  <span onclick="event.stopPropagation(); changeImage(-1)" style="position:absolute; top:50%; left:16px; transform:translateY(-50%); color:rgba(255,255,255,0.5); font-size:48px; cursor:pointer; font-family:'Cormorant Garamond',serif; font-weight:300; padding:20px; user-select:none;">&#8249;</span>
  <img id="lightbox-img" src="" alt="" style="max-width:90vw; max-height:90vh; object-fit:contain; cursor:default;">
  <span onclick="event.stopPropagation(); changeImage(1)" style="position:absolute; top:50%; right:16px; transform:translateY(-50%); color:rgba(255,255,255,0.5); font-size:48px; cursor:pointer; font-family:'Cormorant Garamond',serif; font-weight:300; padding:20px; user-select:none;">&#8250;</span>
</div>

<footer>
  <div class="footer-names">Sareena & Daniel</div>
  <div class="footer-date">November 27–28, 2026 · Goa, India</div>
  <div class="footer-motif">❋ ✦ ❋</div>
</footer>

<script>
  const TOTAL = 24;
  let current = 0;

  const grid = document.getElementById('gallery-grid');
  for (let i = 1; i <= TOTAL; i++) {
    const img = document.createElement('img');
    img.src = `Wedding ${i}.jpg`;
    img.alt = `Sareena and Daniel — photo ${i}`;
    img.loading = 'lazy';
    img.onclick = () => openLightbox(i - 1);
    grid.appendChild(img);
  }

  function openLightbox(index) {
    current = index;
    document.getElementById('lightbox-img').src = `Wedding ${current + 1}.jpg`;
    const lb = document.getElementById('lightbox');
    lb.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    lb.onclick = (e) => { if (e.target === lb) closeLightbox(); };
  }

  function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
    document.body.style.overflow = '';
  }

  function changeImage(dir) {
    current = (current + dir + TOTAL) % TOTAL;
    document.getElementById('lightbox-img').src = `Wedding ${current + 1}.jpg`;
  }

  document.addEventListener('keydown', e => {
    if (document.getElementById('lightbox').style.display === 'none') return;
    if (e.key === 'ArrowRight') changeImage(1);
    if (e.key === 'ArrowLeft') changeImage(-1);
    if (e.key === 'Escape') closeLightbox();
  });

  function toggleMenu() {
    document.getElementById('nav-links').classList.toggle('open');
  }
</script>
